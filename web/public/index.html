<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Adivinhe a Música</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<!-- Tailwind (OK em dev) -->
<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="../public/assets/style.css">

</head>

<body>

<!-- AJUDA -->
<div class="help-btn">
    <button class="icon-btn">
        <i class="bi bi-question-lg"></i>
    </button>
</div>

<!-- TOPO -->
<div class="top-menu d-flex align-items-center justify-content-end gap-2">

    <div id="area-usuario">
        <button class="icon-btn" id="btnLogin">
            <i class="bi bi-person-fill"></i>
        </button>
    </div>

    <div class="dropdown">
        <button class="icon-btn dropdown-toggle" data-bs-toggle="dropdown">
            <i class="bi bi-gear-fill"></i>
        </button>

        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
            <li><a class="dropdown-item" href="#">1</a></li>
            <li><a class="dropdown-item" href="#">2</a></li>
            <li><a class="dropdown-item" href="#">3</a></li>
        </ul>
    </div>

</div>

<!-- JOGO -->
<div class="game-container">

    <div class="titulo">
        <h1>Jogo de Quiz Musical</h1>
        <p>Adivinhe as Partituras!</p>
    </div>

    <div class="menu">
        <button class="btn-jogar">Jogar</button>
        <button class="btn-demo">Demo</button>
    </div>

</div>

<!-- MODAL -->
<div id="loginModal" class="login-modal">

<div class="login-box">

<span class="fechar">&times;</span>

<!-- LOGIN -->
<form id="formLogin">

<h2 class="mb-3">Login</h2>

<label>Email:</label>
<div class="input-group mb-3">
<span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
<input type="email" name="email" class="form-control" required>
</div>

<label>Senha:</label>
<div class="input-group mb-3">
<span class="input-group-text"><i class="bi bi-lock-fill"></i></span>

<input type="password" name="senha" id="campoSenha" class="form-control" required>

<span class="input-group-text olho-senha" onclick="toggleSenha('campoSenha', this)">
<i class="bi bi-eye"></i>
</span>
</div>

<button type="submit" class="btn btn-primary w-100 mb-3">Entrar</button>

<button type="button" id="google-login" class="btn btn-danger w-100 mt-2">
    <i class="bi bi-google"></i> Entrar com Google
</button>
<p class="text-center">
Não possui login?
<button type="button" id="abrirCadastro" class="btn btn-link p-0">
Cadastre-se aqui
</button>
</p>

</form>

<!-- ================= CADASTRO ================= -->

<form id="formCadastro" method="POST" action="../private/php/cadastro.php" style="display:none;" novalidate>

<h2 class="mb-3">Cadastro</h2>

<!-- NOME -->
<label class="form-label text-start w-100">Nome:</label>

<div class="input-group mb-1">
    <span class="input-group-text">
        <i class="bi bi-person-fill"></i>
    </span>
    <input type="text" name="nome" class="form-control" placeholder="Digite seu nome" required>
</div>
<small class="text-danger d-block mb-2 mensagem-erro"></small>

<label class="form-label text-start w-100">Email:</label>

<div class="input-group mb-1">
    <span class="input-group-text">
        <i class="bi bi-envelope-fill"></i>
    </span>
    <input type="email" name="email" class="form-control" placeholder="Digite seu email" required>
</div>

<small class="text-danger d-block mb-2 mensagem-erro"></small>

<!-- DATA DE NASCIMENTO -->
<label class="form-label">Data de Nascimento:</label>
<div class="input-group mb-1">
    <span class="input-group-text">
        <i class="bi bi-calendar-date"></i>
    </span>
    <input 
        type="date" 
        id="data_nascimento"
        name="data_nascimento" 
        class="form-control"
        required
    >
</div>

<!--  IDADE DINÂMICA  -->
<small class="text-muted d-block mb-1">
    Idade: <span id="idade">--</span>
</small>

<small class="text-danger d-block mb-2 mensagem-erro"></small>

<!-- SENHA -->
<label class="form-label text-start w-100">Senha:</label>

<div class="input-group mb-1">
    <span class="input-group-text">
        <i class="bi bi-lock-fill"></i>
    </span>

    <input type="password" name="senha" id="senhaCadastro" class="form-control" placeholder="Crie uma senha" required>

    <span class="input-group-text olho-senha" data-target="senhaCadastro">
        <i class="bi bi-eye"></i>
    </span>
</div>
<small class="text-danger d-block mb-2 mensagem-erro"></small>

<!-- CONFIRMAR SENHA -->
<label class="form-label text-start w-100">Confirmar senha:</label>
<div class="input-group mb-3">
<span class="input-group-text">
<i class="bi bi-lock-fill"></i>
</span>

<input type="password" name="confirmar_senha" id="confirmarSenha" class="form-control" placeholder="Repita a senha" required>

<span class="input-group-text olho-senha" data-target="confirmarSenha">
<i class="bi bi-eye"></i>
</span>
</div>
<small class="text-danger d-block mb-2 mensagem-erro"></small>

<button type="submit" class="btn btn-primary w-100 mb-3">Cadastrar</button>


<p class="cadastro-texto text-center">
Já possui conta?
<button type="button" id="voltarLogin" class="btn btn-link p-0">
    Voltar para login
</button>
</p>

</form>

</div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="javascript/home.js"></script>

</body>
</html>
