<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Adivinhe a Música</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="../public/assets/style.css">

</head>

<body>

<!-- POPUP USERNAME -->
<div id="popupUsername" class="popup-overlay">
    <div class="popup-box">
        <h3>Escolha seu username</h3>
        <input type="text" id="inputUsername" placeholder="Seu nome">
        <button onclick="salvarUsername()">Continuar</button>
    </div>
</div>

<!-- AJUDA -->
<div class="help-btn">
    <button class="icon-btn">
        <i class="bi bi-question-lg"></i>
    </button>
</div>

<!-- TOPO -->
<div class="top-menu d-flex align-items-center justify-content-end gap-2">
    <div id="area-usuario"></div>

    <div class="dropdown">
        <button class="icon-btn dropdown-toggle" data-bs-toggle="dropdown">
            <i class="bi bi-gear-fill"></i>
        </button>

        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
            <li><a class="dropdown-item" href="#">1</a></li>
            <li><a class="dropdown-item" href="#">2</a></li>
            <li><a class="dropdown-item" href="#">3</a></li>
        </ul>
    </div>
</div>

<!-- CONTEÚDO -->
<div class="game-container">

    <!-- DASHBOARD -->
    <div id="dashboard" style="display:none;" class="spotify-dashboard">
        <div class="dashboard-header">
            <h2 id="dashboardNome">Olá 👋</h2>
            <p>Pronto para jogar?</p>
        </div>

        <div class="dashboard-grid">
            <div class="card-dash">
                <h4>Partidas</h4>
                <p id="totalJogos">0</p>
            </div>

            <div class="card-dash">
                 <h4>Ver Historico</h4>
                
            </div>

             <div class="card-dash">
                <h4>Pontuação</h4>
                <p id="totalAcertos">0</p>
            </div>
        </div>
    </div>

    <!-- TELA INICIAL -->
    <div class="titulo">
        <h1>Jogo de Quiz Musical</h1>
        <p>Adivinhe as Partituras!</p>
    </div>

    <div class="menu">
        <button class="btn-jogar">Jogar</button>
        <button class="btn-demo">Demo</button>
    </div>

</div>

<!-- MODAL LOGIN -->
<div id="loginModal" class="login-modal">
    <div class="login-box">

        <!-- BOTÃO FECHAR (X) -->
        <span class="fechar" id="fecharModal">&times;</span>

        <!-- LOGIN -->
        <form id="formLogin">
            <h2 class="mb-3">Login</h2>

            <label>Email:</label>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                <input type="email" name="email" class="form-control" required>
            </div>

            <label>Senha:</label>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>

                <input type="password" name="senha" id="campoSenha" class="form-control" required>

                <span class="input-group-text olho-senha" data-target="campoSenha">
                <i class="bi bi-eye"></i>
                </span>
            </div>

            <!-- BOTÕES FORA DO INPUT-GROUP -->
            <button type="submit" class="btn btn-primary w-100 mb-3">Entrar</button>

            <button type="button" id="google-login" class="btn btn-danger w-100 mt-2">
                <i class="bi bi-google"></i> Entrar com Google
            </button>

            <p class="text-center">
                Não possui login?
                <button type="button" id="abrirCadastro" class="btn btn-link p-0">
                    Cadastre-se aqui
                </button>
            </p>
        </form>

        <!-- CADASTRO -->
        <form id="formCadastro" style="display:none;" novalidate>

            <h2 class="mb-3">Cadastro</h2>

            <label>Nome:</label>
            <input type="text" name="nome" class="form-control mb-2" required>

            <label>Email:</label>
            <input type="email" name="email" class="form-control mb-2" required>

            <label>Data de Nascimento:</label>
            <input type="date" id="data_nascimento" name="data_nascimento" class="form-control mb-2" required>

            <!-- SENHA -->
             <label>Senha:</label>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>

               <input type="password" name="senha" id="senhaCadastro" class="form-control" required>

              <span class="input-group-text olho-senha" data-target="senhaCadastro">
               <i class="bi bi-eye"></i>
              </span>
            </div>

            <!-- CONFIRMAR SENHA -->
             <label>Confirmar Senha:</label>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>

                <input type="password" name="confirmar_senha" id="confirmarSenha" class="form-control" required>

               <span class="input-group-text olho-senha" data-target="confirmarSenha">
               <i class="bi bi-eye"></i>
               </span>
            </div>

            <!-- BOTÃO CADASTRO (ESTAVA FALTANDO) -->
            <button type="submit" class="btn btn-primary w-100 mb-3">Cadastrar</button>

            <p class="text-center">
                Já possui conta?
                <button type="button" id="voltarLogin" class="btn btn-link p-0">
                    Voltar para login
                </button>
            </p>

        </form>

    </div>
</div>

<!-- MODAL PERFIL -->
<div id="modalPerfil" class="modal-perfil" style="display:none;">
    <div class="perfil-box">

        <h3>Seu Perfil</h3>

        <label>Nome</label>
        <input type="text" id="perfilNome" class="form-control mb-2">

        <p>Email: <span id="perfilEmail"></span></p>

        <hr>

        <!-- BLOCO SENHA NORMAL -->
        <div id="blocoSenhaNormal">
            <input type="password" id="senhaAtual" placeholder="Senha atual" class="form-control mb-2">
        </div>

        <!-- NOVA SENHA (AMBOS USAM) -->
        <input type="password" id="novaSenha" placeholder="Nova senha" class="form-control mb-2">

        <button id="salvarPerfil" class="btn btn-success w-100 mb-2">
            Salvar Alterações
        </button>

        <button onclick="fecharPerfil()" class="btn btn-secondary w-100">
            Fechar
        </button>

    </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="javascript/home.js"></script>

</body>
</html>
