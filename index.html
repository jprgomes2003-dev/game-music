<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Adivinhe a Música</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>


<div class="help-btn">
    <button class="icon-btn">
        <i class="bi bi-question-lg"></i>
    </button>
</div>



<div class="top-menu">

  
   <button class="icon-btn" id="btnLogin">
    <i class="bi bi-person-fill"></i>
</button>

<!-- Janela de Login -->
<div id="loginModal" class="login-modal">

    <div class="login-box">

        <span class="fechar">&times;</span>

        <h2 class="mb-3">Login</h2>

        <!-- Email -->
        <label class="form-label text-start w-100">Digite seu email:</label>
        <div class="input-group mb-3">
            <span class="input-group-text">
                <i class="bi bi-envelope-fill icone-email"></i>
            </span>
            <input type="email" class="form-control" placeholder="exemplo@email.com">
        </div>

        <!-- Senha -->
        <label class="form-label text-start w-100">Digite sua senha:</label>
        <div class="input-group mb-3">

            <span class="input-group-text">
                <i class="bi bi-lock-fill icone-senha"></i>
            </span>

            <input type="password" id="campoSenha" class="form-control" placeholder="Digite sua senha">

            <span class="input-group-text olho-senha" id="toggleSenha">
                <i class="bi bi-eye"></i>
            </span>

        </div>
        
        <button class="btn btn-primary w-100 mb-3">Entrar</button>

        <p class="cadastro-texto text-center">
            Não possui login? 
            <a href="cadastro.html" class="link-cadastro">Cadastre-se aqui</a>
        </p>

    </div>

</div>

    <div class="dropdown">

        <button class="icon-btn dropdown-toggle" data-bs-toggle="dropdown">
            <i class="bi bi-gear-fill"></i>
        </button>

        <ul class="dropdown-menu dropdown-menu-dark">

            <li><a class="dropdown-item" href="#">Som</a></li>
            <li><a class="dropdown-item" href="#">Idioma</a></li>
            <li><a class="dropdown-item" href="#">Tema</a></li>

        </ul>

    </div>

</div>


<div class="game-container">

    <div class="titulo">
        <h1>Jogo de Quiz Musical</h1>
        <p>Adivinhe as Partituras!</p>
    </div>

    <div class="menu">

        <button class="btn-jogar">
            Jogar
        </button>

        <button class="btn-demo">
            Demo
        </button>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="home.js"></script>

</body>
</html>
